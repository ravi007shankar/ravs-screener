name: Ravs Daily Screener

permissions:
  contents: write

on:
  schedule:
    - cron: '30 11 * * 1-5'
workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - run: pip install -r requirements.txt
      
      - run: python ravs_screener.py
      
      - run: |
          git config user.name "RavsBot"
          git config user.email "bot@ravstrades.com"
          git add public/data/
          git commit -m "🔥 Ravs Scan $(date)" || echo "No changes to commit"
          git push || echo "Push failed or no changes"
